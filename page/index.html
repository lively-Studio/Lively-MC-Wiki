<!DOCTYPE html>
<html lang="zh-Hans" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lively Minecraft Wiki</title>
  <meta name="description" content="Lively Minecraft Wiki · 中文百科">
  <link rel="icon" type="image/jpeg" href="favicon.jpg">

  <link rel="preconnect" href="https://fonts.loli.net">
  <link rel="preconnect" href="https://gstatic.loli.net" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">

  <link href="https://fonts.loli.net/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/markdown.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/15.0.7/marked.min.js" defer></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark-dimmed.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js" defer></script>
</head>
<body>
  <header class="top-app-bar" id="topAppBar">
    <div class="top-app-bar__start">
      <button class="icon-button" id="menuToggle" aria-label="菜单">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
      </button>
      <a href="../" class="top-app-bar__brand" title="返回首页">
        <div class="brand-icon">
          <img src="../assets/logo.jpg" alt="Logo" width="32" height="32" style="border-radius:6px" id="appLogo">
        </div>
        <div class="brand-text">
          <span class="brand-name">Lively Minecraft Wiki</span>
          <span class="brand-subtitle">Lively 中文百科</span>
        </div>
      </a>
    </div>
    <div class="top-app-bar__end">
      <div class="doc-search" id="docSearch">
        <div class="doc-search__box">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" class="doc-search__icon">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" class="doc-search__input" id="docSearchInput" placeholder="搜索文章..." autocomplete="off">
          <kbd class="doc-search__shortcut">/</kbd>
        </div>
        <div class="doc-search__results" id="docSearchResults" style="display:none">
          <div class="doc-search__results-inner" id="docSearchResultsInner"></div>
        </div>
      </div>
      <a href="../" class="icon-button" aria-label="返回首页" title="返回首页">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </a>
      <a href="#/about" class="icon-button" aria-label="关于">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
      </a>
      <button class="icon-button" id="themeToggle" aria-label="切换主题">
        <svg viewBox="0 0 24 24" width="24" height="24" class="theme-icon" id="themeIcon" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <div class="drawer-overlay" id="drawerOverlay"></div>

  <nav class="sidebar" id="sidebar">
    <a href="../" class="sidebar__header" title="返回首页">
      <div class="brand-icon">
        <img src="../assets/logo.jpg" alt="Logo" width="32" height="32" style="border-radius:6px" id="appLogo">
      </div>
      <div class="brand-text">
        <span class="brand-name">Lively Minecraft Wiki</span>
        <span class="brand-subtitle">Lively 中文百科</span>
      </div>
    </a>

    <!-- Sidebar Search -->
    <div class="sidebar-search" id="sidebarSearch">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" class="sidebar-search__icon">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" class="sidebar-search__input" id="sidebarSearchInput" placeholder="在侧边栏中查找..." autocomplete="off">
    </div>

    <!-- Navigation Sections -->
    <div class="nav-sections" id="navList">
      <!-- Dynamically rendered by app.js -->
    </div>

    <div class="sidebar__footer" id="sidebarLinks">
    </div>
  </nav>

  <main class="main-content" id="mainContent">
    <div class="content-wrapper">
      <article class="doc-article" id="docArticle">
        <div class="doc-header" id="docHeader">
          <h1 class="doc-title" id="docTitle">加载中...</h1>
          <div class="doc-meta" id="docMeta"></div>
        </div>
        <div class="doc-body markdown-body" id="docBody">
          <div class="loading-state"><div class="loading-spinner"></div><p>加载文档中...</p></div>
        </div>
      </article>
      <aside class="toc-sidebar" id="tocSidebar">
        <div class="toc-header">目录</div>
        <ul class="toc-list" id="tocList"></ul>
      </aside>
    </div>
  </main>

  <button class="fab" id="scrollTop" aria-label="回到顶部">
    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
  </button>

  <script src="js/app.js"></script>
</body>
</html>
